<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      .c-hero-animate {
        position: relative;
        width: 100%;
        overflow: hidden;
        border-radius: 12px;
        background: #1a1a2e;
        height: auto;
      }
      .c-hero-animate img {
        width: 100vw;
      }
      .c-hero-animate__panel {
        position: absolute;
        inset: 0;
        z-index: 2;
        will-change: transform;
      }
      .c-hero-animate__panel-left {
        background: black;
        clip-path: polygon(48% 0, 0 0, 0 100%, 58% 100%);
      }
      .c-hero-animate__panel-right {
        background: black;
        clip-path: polygon(100% 0, 48% 0, 58% 100%, 100% 100%);
      }
      .c-hero-animate.animate .c-hero-animate__panel-left {
        animation: out-left 1.5s cubic-bezier(0.7, 0, 0.2, 1) forwards;
      }
      .c-hero-animate.animate .c-hero-animate__panel-right {
        animation: out-right 1.5s cubic-bezier(0.7, 0, 0.2, 1) forwards;
      }
      @keyframes out-left {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(-10%, -110%);
        }
      }
      @keyframes out-right {
        0% {
          transform: translate(0, 0);
        }
        100% {
          transform: translate(10%, 110%);
        }
      }

      @keyframes slide-out-left {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translate(-100%, -20%);
        }
      }

      @keyframes slide-out-right {
        0% {
          transform: translateX(0);
        }
        100% {
          transform: translate(100%, 10%);
        }
      }
     

      @media screen and (max-width: 767px) {
        .c-hero-animate__panel {
          inset: 0;
        }

      
        .c-hero-animate__panel-left {
          background: black;
          clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 100% 62%, 0% 45%);
        }

        .c-hero-animate__panel-right {
          background: black;
          clip-path: polygon(100% 100%, 0% 100%, 0% 0%, 0% 45%, 100% 55%);
        }

        .c-hero-animate.animate .c-hero-animate__panel-left {
          animation: slide-out-left 1.2s cubic-bezier(0.7, 0, 0.2, 1) forwards;
        }

        .c-hero-animate.animate .c-hero-animate__panel-right {
          animation: slide-out-right 1.2s cubic-bezier(0.7, 0, 0.2, 1) forwards;
        }
      }
    </style>
  </head>
  <body>
    <div class="c-hero-animate animate" id="c-hero-animate">
      <picture>
        <source
          srcset="assets/img/common/bg_hero3_sp.png"
          media="(max-width:767px)"
        />
        <img src="assets/img/common/bg_hero1.png" alt="" />
      </picture>

      <div class="c-hero-animate__panel c-hero-animate__panel-left"></div>
      <div class="c-hero-animate__panel c-hero-animate__panel-right"></div>
    </div>



  </body>
</html>
